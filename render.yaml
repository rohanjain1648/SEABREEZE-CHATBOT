services:
  # Backend: FastAPI Web Service
  - type: web
    name: seabreeze-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User must provide this in Render Dashboard
      - key: PORT
        value: 8000
    plan: free

  # Frontend: React Static Site
  - type: static
    name: seabreeze-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: seabreeze-backend
          type: web
          property: host
    plan: free
